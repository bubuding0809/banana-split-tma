name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy_apps:
        description: 'Force-deploy lambda/web/bot regardless of path filters'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      lambda: ${{ steps.filter.outputs.lambda }}
      web: ${{ steps.filter.outputs.web }}
      bot: ${{ steps.filter.outputs.bot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambda:
              - 'apps/lambda/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
            bot:
              - 'apps/bot/**'
              - 'packages/**'

  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Prepare database env
        run: |
          {
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "DIRECT_URL=${{ secrets.DIRECT_URL }}"
          } > packages/database/.env.production

      - name: Run DB Migration
        run: pnpm --filter database db:deploy

  deploy-lambda:
    needs: [filter, migrate]
    if: needs.filter.outputs.lambda == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install @vercel/config
        run: npm install @vercel/config

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LAMBDA }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-web:
    needs: [filter, migrate]
    if: needs.filter.outputs.web == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install @vercel/config
        run: npm install @vercel/config

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-bot:
    needs: [filter, migrate]
    if: needs.filter.outputs.bot == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install @vercel/config
        run: npm install @vercel/config

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BOT }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
