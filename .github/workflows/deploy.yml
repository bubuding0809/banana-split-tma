name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy_apps:
        description: "Force-deploy lambda/web/bot/admin regardless of path filters"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turbo Remote Cache — shared with local dev + pr-checks via Vercel.
  # Main callsite: publish-cli's `pnpm turbo run build --filter=…^...`
  # for building the CLI's workspace deps before npm publish.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      lambda: ${{ steps.filter.outputs.lambda }}
      web: ${{ steps.filter.outputs.web }}
      bot: ${{ steps.filter.outputs.bot }}
      admin: ${{ steps.filter.outputs.admin }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambda:
              - 'apps/lambda/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
            bot:
              - 'apps/bot/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            cli:
              - 'apps/cli/**'
              - 'packages/**'

  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Prepare database env
        run: |
          {
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "DIRECT_URL=${{ secrets.DIRECT_URL }}"
          } > packages/database/.env.production

      - name: Run DB Migration
        run: pnpm --filter database db:deploy

  deploy-lambda:
    needs: [filter, migrate]
    if: needs.filter.outputs.lambda == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LAMBDA }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-web:
    needs: [filter, migrate]
    if: needs.filter.outputs.web == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-bot:
    needs: [filter, migrate]
    if: needs.filter.outputs.bot == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BOT }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-admin:
    needs: [filter, migrate]
    if: needs.filter.outputs.admin == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  publish-cli:
    needs: [filter]
    if: needs.filter.outputs.cli == 'true' || inputs.force_deploy_apps
    runs-on: ubuntu-latest
    permissions:
      contents: write # write: push git tag after successful publish
      id-token: write # Required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # npm 11+ ships with Node 24; required for OIDC publish auth
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Check if version already on npm
        id: check
        working-directory: apps/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@banananasplitz/cli@$VERSION" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@banananasplitz/cli@$VERSION is already published on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@banananasplitz/cli@$VERSION is new — will publish."
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies of the CLI
        # The CLI's tsup config uses noExternal: [/.*/] so it bundles every
        # workspace import. Those libraries (e.g. @repo/categories) need their
        # dist/ built before tsup can resolve them. Turbo filter ^... means
        # "all dependencies of @banananasplitz/cli, not the CLI itself".
        if: steps.check.outputs.skip == 'false'
        run: pnpm turbo run build --filter=@banananasplitz/cli^...

      - name: Publish to npm (Trusted Publishing + provenance)
        if: steps.check.outputs.skip == 'false'
        working-directory: apps/cli
        # pnpm publish (vs npm publish) — npm refuses the tarball because
        # pnpm's workspace: protocol deps haven't been rewritten yet; pnpm
        # resolves them correctly. --no-git-checks bypasses pnpm's
        # uncommitted-change guard since CI runs on a clean checkout.
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Tag published version
        id: tag
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          TAG="@banananasplitz/cli@${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} already exists — skipping tag push."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Pushed git tag ${TAG}."

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false' && steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --latest
          echo "::notice::Created GitHub Release ${TAG}."
