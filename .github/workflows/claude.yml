name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, reopened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@claude') || contains(github.event.pull_request.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write access so @claude can actually reply on PRs + issues.
      # issues: write covers the general PR-comment endpoint too (GitHub
      # models PR conversation comments under the issues API).
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # For pull_request open/reopen events, the action's tag-mode trigger
          # detection doesn't scan the PR body for @claude — it only fires on
          # comment/review events. The job's `if:` already gates on @claude
          # in the PR body/title, so this prompt only runs when tagged. The
          # explicit prompt switches the action into agent mode for those
          # events. For comment-triggered events, prompt is empty and the
          # action falls back to its default tag-mode behavior (uses the
          # comment body as the prompt).
          prompt: ${{ github.event_name == 'pull_request' && format('You were tagged in PR #{0} ({1}). Review the diff for merge readiness. Post ONE review comment with the verdict on the first line — exactly one of: READY, NEEDS CHANGES, UNCERTAIN. Then 1–6 short bullets explaining. Focus on correctness bugs, schema/migration safety, secret/credential leaks, money or auth logic mistakes, and obvious regressions. Skip nits and style. If the diff is small and clearly correct, pick READY. Do not push commits or modify the PR; just post the review comment.', github.event.pull_request.number, github.event.pull_request.title) || '' }}


          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'
