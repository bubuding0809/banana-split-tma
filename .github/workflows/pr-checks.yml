name: PR Checks

on:
  pull_request:
    paths:
      - 'packages/database/prisma/**'
      - 'packages/database/package.json'
      - '.github/workflows/pr-checks.yml'

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-sync:
    name: Prisma schema ↔ migrations sync
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Apply all migrations to shadow DB
        run: pnpm --filter @dko/database exec prisma migrate deploy

      - name: Assert schema matches migrations
        run: pnpm --filter @dko/database exec prisma migrate status
