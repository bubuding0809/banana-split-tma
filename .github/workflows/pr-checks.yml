name: PR Checks

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

jobs:
  lockfile-sync:
    name: pnpm lockfile ↔ package.json sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Verify lockfile matches package.json
        run: pnpm install --frozen-lockfile

  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Prettier check
        run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Seed env files from examples
        run: |
          for f in $(find apps packages -name '.env.example' -not -path '*/node_modules/*'); do
            cp "$f" "${f%.example}"
          done
      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test
        run: pnpm test

  cli-version-bump:
    name: CLI version bump (on apps/cli/src/** change)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for runtime CLI changes without version bump
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Only runtime sources count — tests and docs are exempt.
          CHANGED_RUNTIME=$(git diff --name-only "$BASE" "$HEAD" -- \
            'apps/cli/src/**' \
            ':(exclude)apps/cli/src/**/*.test.ts' \
            ':(exclude)apps/cli/src/**/*.spec.ts' \
            || true)

          if [ -z "$CHANGED_RUNTIME" ]; then
            echo "::notice::No runtime CLI sources changed — version bump not required."
            exit 0
          fi

          echo "Changed runtime files:"
          echo "$CHANGED_RUNTIME" | sed 's/^/  - /'

          BASE_VERSION=$(git show "$BASE:apps/cli/package.json" | jq -r .version)
          HEAD_VERSION=$(jq -r .version apps/cli/package.json)
          echo "apps/cli/package.json version: base=$BASE_VERSION head=$HEAD_VERSION"

          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "::error::CLI runtime source changed but apps/cli/package.json version did not. Bump the version (and apps/cli/skills/banana-cli/SKILL.md frontmatter) before merging."
            exit 1
          fi

          echo "::notice::CLI version bumped $BASE_VERSION → $HEAD_VERSION ✓"

  schema-sync:
    name: Prisma schema ↔ migrations sync
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Apply all migrations to shadow DB
        run: pnpm --filter @dko/database exec prisma migrate deploy
      - name: Assert schema matches migrations
        run: pnpm --filter @dko/database exec prisma migrate status
