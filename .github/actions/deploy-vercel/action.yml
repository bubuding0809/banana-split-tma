name: Deploy Vercel project (prebuilt)
description: pull → build on the runner → deploy --prebuilt. Skips Vercel's hosted build queue.

inputs:
  app-name:
    description: Workspace package name of the app being deployed (e.g. web, lambda).
    required: true
  vercel-token:
    description: Vercel auth token.
    required: true
  vercel-org-id:
    description: Vercel team/org ID.
    required: true
  vercel-project-id:
    description: Vercel project ID for this app.
    required: true
  target:
    description: production or preview.
    required: false
    default: production
  git-sha:
    description: Commit SHA — surfaced in the Vercel deployment record.
    required: true
  git-ref:
    description: Branch ref name.
    required: true
  git-message:
    description: Commit message.
    required: true

runs:
  using: composite
  steps:
    # vercel build hardcodes pnpm paths that only exist on Vercel's
    # build container (see vercel/vercel#15204). Activating pnpm via
    # corepack and running vercel from the REPO ROOT — not the app dir
    # — sidesteps both the path bug and the cwd double-concat bug.
    - name: Enable corepack pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@9.0.0 --activate

    # Pin to 51.x — 52.0.0 ships breaking changes, and earlier 51.x
    # versions don't support recent Next.js builders.
    - name: Cache global pnpm dir
      id: pnpm-global
      shell: bash
      run: echo "dir=$(pnpm config get global-dir)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-global.outputs.dir }}
        key: ${{ runner.os }}-pnpm-global-vercel-51
    - name: Install Vercel CLI 51
      shell: bash
      run: pnpm add -g vercel@51

    # Stage the project link at repo root so vercel CLI runs from
    # there and lets the dashboard's rootDirectory resolve once.
    - name: Stage .vercel/project.json
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: |
        mkdir -p .vercel
        printf '{"projectId":"%s","orgId":"%s"}\n' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json

    # vercel build runs `pnpm run build` inside apps/<name>/, which is
    # `tsc -b && vite build` for web/admin. tsc needs workspace deps'
    # dist/ to resolve types (e.g. @dko/trpc), so build them first.
    # Turbo cache + remote cache makes this near-free on warm runs.
    - name: Build workspace deps
      shell: bash
      run: pnpm turbo run build --filter=${{ inputs.app-name }}^...

    - name: Pull Vercel env
      shell: bash
      env:
        ENABLE_EXPERIMENTAL_COREPACK: "1"
      run: vercel pull --yes --environment=${{ inputs.target }} --token=${{ inputs.vercel-token }}

    - name: Build
      shell: bash
      env:
        ENABLE_EXPERIMENTAL_COREPACK: "1"
      run: |
        if [ "${{ inputs.target }}" = "production" ]; then
          vercel build --prod --token=${{ inputs.vercel-token }}
        else
          vercel build --token=${{ inputs.vercel-token }}
        fi

    - name: Deploy prebuilt
      shell: bash
      env:
        VERCEL_GIT_COMMIT_SHA: ${{ inputs.git-sha }}
        VERCEL_GIT_COMMIT_REF: ${{ inputs.git-ref }}
        VERCEL_GIT_COMMIT_MESSAGE: ${{ inputs.git-message }}
      run: |
        if [ "${{ inputs.target }}" = "production" ]; then
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ inputs.vercel-token }}
        else
          vercel deploy --prebuilt --archive=tgz --token=${{ inputs.vercel-token }}
        fi
